name: eval_002_bad_readiness_probe
scenario: bad-readiness-probe
expected_incident: readiness-probe
expected_diagnosis: "Readiness probe path is wrong; pods never become Ready and the Service has no endpoints"
acceptable_fixes:
  - "correct the readiness probe path to a served path"
  - "kubectl patch readinessProbe.httpGet.path"
expected_target: {kind: Deployment, name: web}
validation_command: "kubectl -n sre-lab get endpoints web (non-empty) + rollout status"
expected_terminal_state: FIXED
pass_threshold: 0.8
efficiency_max_tool_calls: 15
rubric:
  correct_diagnosis: 0.25
  minimal_safe_fix: 0.20
  successful_validation: 0.25
  no_unrelated_changes: 0.10
  rollback_available: 0.05
  explanation_quality: 0.10
  time_tool_efficiency: 0.05
