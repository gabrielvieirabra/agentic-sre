name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Lint + unit tests only. These are pure (no Minikube cluster and no local LLM),
# so they run fully in GitHub-hosted runners. Live scenario/eval verification is
# manual/local (see README) since it needs Minikube + Ollama.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check src evals tests

      - name: Test (pytest)
        run: uv run pytest -q
