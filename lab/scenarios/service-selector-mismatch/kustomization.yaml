apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: sre-lab
resources:
  - ../../manifests/base
# FAULT: Service selector no longer matches the pod labels -> no endpoints.
patches:
  - target:
      kind: Service
      name: web
    patch: |-
      - op: replace
        path: /spec/selector/app
        value: web-broken
