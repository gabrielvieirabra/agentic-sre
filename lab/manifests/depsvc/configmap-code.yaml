apiVersion: v1
kind: ConfigMap
metadata:
  name: depsvc-code
  labels:
    app: depsvc
data:
  # Tiny HTTP service whose readiness depends on an external dependency mode.
  # MODE is injected from the depsvc-config ConfigMap at pod start.
  #   up | fallback -> /ready 200 (healthy)
  #   down          -> /ready 503 (dependency down)
  server.py: |
    import os
    from http.server import BaseHTTPRequestHandler, HTTPServer

    MODE = os.environ.get("MODE", "up")

    class H(BaseHTTPRequestHandler):
        def do_GET(self):
            healthy = MODE in ("up", "fallback")
            if self.path == "/healthz":
                code = 200
            elif self.path == "/ready":
                code = 200 if healthy else 503
            else:
                code = 200 if healthy else 503
            body = f"mode={MODE} path={self.path}\n".encode()
            self.send_response(code)
            self.send_header("Content-Type", "text/plain")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def log_message(self, *args):
            pass

    print(f"depsvc starting on :8080 (MODE={MODE})", flush=True)
    HTTPServer(("0.0.0.0", 8080), H).serve_forever()
